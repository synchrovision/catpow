<?xml version="1.0" encoding="UTF-8"?>
<svg id="base" xmlns="http://www.w3.org/2000/svg" width="150" height="150" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 150 150">
  <defs>
    <style>
      .cls-1 {
        filter: url(#drop-shadow-1);
      }

      .cls-2 {
        fill: url(#_名称未設定グラデーション_55);
      }
    </style>
    <filter id="drop-shadow-1" x="1" y="3" width="148" height="148" filterUnits="userSpaceOnUse">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur result="blur" stdDeviation="3"/>
      <feFlood flood-color="#000" flood-opacity=".3"/>
      <feComposite in2="blur" operator="in"/>
      <feComposite in="SourceGraphic"/>
    </filter>
    <linearGradient id="_名称未設定グラデーション_55" data-name="名称未設定グラデーション 55" x1="75" y1="140" x2="75" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7f7f7"/>
      <stop offset="1" stop-color="#fff"/>
    </linearGradient>
  </defs>
  <g class="cls-1">
    <rect class="cls-2" x="10" y="10" width="130" height="130"/>
  </g>
</svg>